name: EAS Build

on:
  workflow_dispatch:
    inputs:
      platform:
        description: 'Für welche Plattform bauen?'
        required: true
        default: android
        type: choice
        options:
          - android
          - ios
          - all
      profile:
        description: 'EAS Build-Profil (aus eas.json)'
        required: true
        default: production
        type: choice
        options:
          - production
          - preview
          - development

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4

      - name: Node einrichten
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: EAS CLI einrichten
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Abhängigkeiten installieren
        run: npm ci

      - name: EAS Build starten
        run: eas build --platform ${{ inputs.platform }} --profile ${{ inputs.profile }} --non-interactive --wait
